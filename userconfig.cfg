bind "F1" "ak47; m4a1; primammo; vesthelm; flash; flash; sgren; hegren"
bind "F2" "deagle; secammo; vesthelm; flash; flash; sgren; hegren"
bind "F3" "awp; primammo; deagle; secammo; vesthelm; flash; flash; sgren; hegren"
bind "F4" "famas; galil; primammo; vesthelm; defuser; flash; flash; sgren; hegren"

bind "c" "weapon_smokegrenade"
bind "f" "weapon_flashbang"
bind "v" "weapon_hegrenade"


bind "mwheelup" "+jump"          // Tepaga aylantirsa - sakraydi
bind "mwheeldown" "+duck"        // Pastga aylantirsa - o'tirib turadi (Duck-spam)
bind "space" "+jump"             // Space ham sakraydi
bind "ctrl" "+duck"              // Ctrl ham o'tiradi


cl_dynamiccrosshair 0            // Nishon kengayib ketmaydi
cl_minmodels 1                   // Dushmanlar bir xil kiyimda (tanish oson)
net_graph 3                      // FPS va Pingni ekranda ko'rsatadi
sensitivity 2.0                  // Sichqoncha tezligi (o'zingizga qarab o'zgartiring)
